name: Weekly repo health scan

on:
  schedule:
    # Monday 06:00 UTC — tune for your timezone if you want results waiting
    # when your team starts the week
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Scan a single repo (leave blank to scan all auto-discovered targets)'
        required: false
        type: string

permissions:
  contents: write   # commit new reports + regenerated dashboard back to repo-health

concurrency:
  group: weekly-scan
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Discover — auto-detect repos in the org, apply rules + overrides
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.emit.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert targets.yml (overrides) to JSON
        run: yq -o=json targets.yml > targets.json

      - name: Auto-discover org repos
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
          ORG: Kilowott-labs
          OVERRIDES: targets.json
          OUTPUT: discovered-targets.json
        run: node scripts/discover.js

      - name: Build matrix list
        id: emit
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.target }}" ]; then
            # Manual single-repo dispatch — scan only what was requested,
            # regardless of discovery. Skip list still applies to prevent
            # accidental scanning of excluded repos.
            requested="${{ github.event.inputs.target }}"
            if jq -e --arg r "$requested" '.skipped[] | select(.name==$r)' discovered-targets.json >/dev/null; then
              echo "::error::Repo '$requested' is in the skip list. Remove it from targets.yml skip: if you want to scan it."
              exit 1
            fi
            targets="[\"$requested\"]"
          else
            targets=$(jq -c '[.repos[].name]' discovered-targets.json)
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Will scan: $targets"

      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovered-targets
          path: discovered-targets.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Scan — one parallel job per target repo
  # ---------------------------------------------------------------------------
  scan:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10   # cap concurrency so 50+ repos queue gracefully rather than stampede
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - name: Checkout repo-health config
        uses: actions/checkout@v4

      - name: Clone target repo with full history
        env:
          TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::ORG_SCAN_TOKEN secret is not set."
            exit 1
          fi
          git clone \
            "https://x-access-token:${TOKEN}@github.com/Kilowott-labs/${{ matrix.target }}.git" \
            target
          cd target
          for remote_branch in $(git branch -r | grep -v ' -> ' | grep -v '/HEAD$'); do
            local_branch=${remote_branch#origin/}
            git branch --track "$local_branch" "$remote_branch" 2>/dev/null || true
          done
          git fetch --all --tags --quiet

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks across full history
        continue-on-error: true
        run: |
          cd target
          gitleaks detect \
            --config ../.gitleaks.toml \
            --report-format json \
            --report-path ../findings.json \
            --log-opts="--all" \
            --no-banner \
            --exit-code 0

      - name: Normalise report
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p "reports/${{ matrix.target }}"
          if [ -s findings.json ] && [ "$(cat findings.json | tr -d '[:space:]')" != "null" ]; then
            cp findings.json "reports/${{ matrix.target }}/${DATE}.json"
          else
            echo "[]" > "reports/${{ matrix.target }}/${DATE}.json"
          fi
          cp "reports/${{ matrix.target }}/${DATE}.json" "reports/${{ matrix.target }}/latest.json"
          echo "Findings for ${{ matrix.target }}:"
          jq 'length' "reports/${{ matrix.target }}/latest.json"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.target }}
          path: reports/${{ matrix.target }}/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 3: Aggregate — merge all per-repo reports and regenerate the dashboard
  # ---------------------------------------------------------------------------
  aggregate:
    needs: [discover, scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download discovery artifact
        uses: actions/download-artifact@v4
        with:
          name: discovered-targets
          path: .

      - name: Download all per-repo reports
        uses: actions/download-artifact@v4
        with:
          path: incoming/
          pattern: report-*

      - name: Merge into reports/
        run: |
          set -euo pipefail
          mkdir -p reports
          for dir in incoming/report-*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir" | sed 's/^report-//')
            mkdir -p "reports/$name"
            cp -r "$dir/"* "reports/$name/"
          done
          rm -rf incoming/

      - name: Regenerate dashboard
        env:
          TARGETS_JSON: discovered-targets.json
        run: node scripts/aggregate.js

      - name: Commit results
        run: |
          set -euo pipefail
          git config user.name  "repo-health-bot"
          git config user.email "repo-health-bot@users.noreply.github.com"
          git add reports/ README.md
          if git diff --cached --quiet; then
            echo "No dashboard changes — exiting cleanly."
          else
            git commit -m "chore(scan): weekly findings $(date -u +%Y-%m-%d)"
            git push
          fi

  # ---------------------------------------------------------------------------
  # Job 4: File issues — update per-repo health issues + weekly digest
  # ---------------------------------------------------------------------------
  file-issues:
    needs: aggregate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest (aggregate may have pushed)
        run: git pull --ff-only origin main

      - name: Download discovery artifact
        uses: actions/download-artifact@v4
        with:
          name: discovered-targets
          path: .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: File / update per-repo health issues
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
          ORG: Kilowott-labs
          TARGETS_JSON: discovered-targets.json
          REPORTS_DIR: reports
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/file-issues.js
