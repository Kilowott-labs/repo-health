name: Weekly repo health scan

on:
  schedule:
    # Monday 03:00 UTC — off-peak (more reliable than 06:00), results ready by business hours
    # in most timezones. Edit if you want a different day/time.
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      target:
        description: 'Scan a single repo (leave blank to scan all auto-discovered targets)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: weekly-scan
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Discover — auto-detect org repos, apply rules + overrides
  # ---------------------------------------------------------------------------
  discover:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.emit.outputs.targets }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Convert targets.yml (overrides) to JSON
        run: yq -o=json targets.yml > targets.json

      - name: Auto-discover org repos
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
          ORG: Kilowott-labs
          OVERRIDES: targets.json
          OUTPUT: discovered-targets.json
        run: node scripts/discover.js

      - name: Build matrix list
        id: emit
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.target }}" ]; then
            requested="${{ github.event.inputs.target }}"
            if jq -e --arg r "$requested" '.skipped[] | select(.name==$r)' discovered-targets.json >/dev/null; then
              echo "::error::Repo '$requested' is in the skip list."
              exit 1
            fi
            targets="[\"$requested\"]"
          else
            targets=$(jq -c '[.repos[].name]' discovered-targets.json)
          fi
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Will scan: $targets"

      - name: Upload discovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovered-targets
          path: discovered-targets.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Scan — per-repo matrix, runs Gitleaks + stack-aware scanners
  # ---------------------------------------------------------------------------
  scan:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - name: Checkout repo-health config
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr
          coverage: none

      - name: Set up Python (for Semgrep)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Clone target repo with full history
        env:
          TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::error::ORG_SCAN_TOKEN secret is not set."
            exit 1
          fi
          git clone \
            "https://x-access-token:${TOKEN}@github.com/Kilowott-labs/${{ matrix.target }}.git" \
            target
          cd target
          for remote_branch in $(git branch -r | grep -v ' -> ' | grep -v '/HEAD$'); do
            local_branch=${remote_branch#origin/}
            git branch --track "$local_branch" "$remote_branch" 2>/dev/null || true
          done
          git fetch --all --tags --quiet

      - name: Detect stack
        id: stack
        working-directory: target
        run: bash ../scripts/detect-stack.sh

      # ---------------- Gitleaks (unchanged from Phase 1) ----------------
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run Gitleaks (full history)
        continue-on-error: true
        run: |
          cd target
          gitleaks detect \
            --config ../.gitleaks.toml \
            --report-format json \
            --report-path ../gitleaks-raw.json \
            --log-opts="--all" \
            --no-banner \
            --exit-code 0

      - name: Normalize Gitleaks findings
        run: |
          mkdir -p reports/${{ matrix.target }}
          # Reset latest.json for this repo at start of run — each scanner appends
          echo "[]" > reports/${{ matrix.target }}/latest.json
          node scripts/normalize-findings.js gitleaks gitleaks-raw.json ${{ matrix.target }}

      # ---------------- composer audit (PHP repos only) ----------------
      - name: Run composer audit
        if: steps.stack.outputs.has_composer == 'true'
        continue-on-error: true
        working-directory: target
        run: |
          # Write minimal shell so normalize always has a valid file to read,
          # even if every subsequent step fails.
          echo '{"advisories":{},"abandoned":{}}' > ../composer-raw.json

          install_ok=true
          if [ ! -f composer.lock ]; then
            echo "No composer.lock — running install to generate one"
            if ! composer install --no-interaction --no-progress --no-scripts 2> /tmp/composer-install-stderr.log; then
              install_ok=false
              echo "::warning::composer install failed — see stderr below. Audit will be skipped to avoid malformed output."
              echo "---- composer install stderr ----"
              cat /tmp/composer-install-stderr.log
              echo "---- end stderr ----"
            fi
          fi

          # Only attempt audit if we have something coherent to audit. Without
          # a lockfile and a failed install, composer audit emits "No packages —
          # skipping audit." to stdout, which isn't JSON and breaks the pipeline.
          if [ "$install_ok" = "true" ] || [ -f composer.lock ]; then
            # composer audit exits non-zero when advisories exist — that's normal.
            # Capture stderr separately so real tool failures are visible.
            composer audit --format=json --no-interaction > ../composer-raw.json 2> /tmp/composer-stderr.log || true

            if [ -s /tmp/composer-stderr.log ]; then
              echo "---- composer audit stderr ----"
              cat /tmp/composer-stderr.log
            fi

            # Validate the output is actually JSON. If composer emitted human
            # text (e.g. "No packages — skipping audit.") restore the shell.
            if ! jq empty ../composer-raw.json 2>/dev/null; then
              echo "::warning::composer audit produced non-JSON output. Restoring empty shell."
              echo '{"advisories":{},"abandoned":{}}' > ../composer-raw.json
            fi

            adv_count=$(jq '.advisories | length' ../composer-raw.json 2>/dev/null || echo "0")
            echo "composer audit: ${adv_count:-0} packages with advisories"
          else
            echo "::warning::Skipping composer audit for this repo — no usable lockfile and install failed."
          fi

      - name: Normalize composer audit findings
        if: steps.stack.outputs.has_composer == 'true'
        run: node scripts/normalize-findings.js composer composer-raw.json ${{ matrix.target }}

      # ---------------- npm audit + OSV-Scanner (Node repos only) ----------------
      - name: Run npm audit
        if: steps.stack.outputs.has_npm == 'true'
        continue-on-error: true
        working-directory: target
        run: |
          echo '{"vulnerabilities":{},"metadata":{"vulnerabilities":{"total":0}}}' > ../npm-raw.json

          if [ ! -f package-lock.json ] && [ ! -f yarn.lock ] && [ ! -f pnpm-lock.yaml ]; then
            echo "No lockfile — generating one"
            npm install --package-lock-only --no-audit --no-fund --silent || {
              echo "::warning::npm install failed — audit may return empty"
            }
          fi

          npm audit --json > ../npm-raw.json 2> /tmp/npm-stderr.log || true

          if [ -s /tmp/npm-stderr.log ]; then
            echo "---- npm audit stderr ----"
            head -c 1000 /tmp/npm-stderr.log
          fi

          vuln_count=$(jq '.metadata.vulnerabilities.total' ../npm-raw.json 2>/dev/null || echo "?")
          echo "npm audit: $vuln_count total vulnerabilities"

      - name: Normalize npm audit findings
        if: steps.stack.outputs.has_npm == 'true'
        run: node scripts/normalize-findings.js npm npm-raw.json ${{ matrix.target }}

      - name: Install OSV-Scanner
        if: steps.stack.outputs.has_npm == 'true' || steps.stack.outputs.has_composer == 'true'
        run: |
          VERSION=$(curl -s https://api.github.com/repos/google/osv-scanner/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/
          osv-scanner --version

      - name: Run OSV-Scanner
        if: steps.stack.outputs.has_npm == 'true' || steps.stack.outputs.has_composer == 'true'
        continue-on-error: true
        working-directory: target
        run: osv-scanner --recursive --format=json --output=../osv-raw.json . || true

      - name: Normalize OSV findings
        if: steps.stack.outputs.has_npm == 'true' || steps.stack.outputs.has_composer == 'true'
        run: node scripts/normalize-findings.js osv osv-raw.json ${{ matrix.target }}

      # ---------------- PHPCS + WPCS (WordPress repos only) ----------------
      - name: Install PHPCS + WPCS + PHPCompatibilityWP + WooCommerce sniffs
        if: steps.stack.outputs.has_wp == 'true'
        run: |
          set -euo pipefail

          # Composer 2.2+ blocks plugins by default for security.
          # dealerdirect/phpcodesniffer-composer-installer is the plugin
          # that auto-registers WPCS + other standards with phpcs. Without
          # it allowed, phpcs only sees PEAR/PSR/Squiz and "sniff does not
          # exist" errors cascade through every WP rule reference.
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

          # Install with verbose output so any conflict is visible in the log.
          # If this step fails, the scan should FAIL — not silently run without
          # standards. The `|| true` that was here before hid the problem for weeks.
          composer global require --no-interaction \
            "squizlabs/php_codesniffer=*" \
            "wp-coding-standards/wpcs=*" \
            "phpcompatibility/phpcompatibility-wp=*" \
            "automattic/vipwpcs=*" \
            "woocommerce/woocommerce-sniffs=*" \
            "dealerdirect/phpcodesniffer-composer-installer=*"

          export PATH="$HOME/.composer/vendor/bin:$PATH"

          # Verify registration worked. phpcs -i should list WordPress + WooCommerce.
          # If it doesn't, fail the step so the issue is visible — better a broken
          # job than a silently empty report.
          echo "---- registered coding standards ----"
          phpcs -i

          if ! phpcs -i | grep -q "WordPress"; then
            echo "::error::PHPCS installed but WordPress standard not registered. Sniffs will fail. Check composer install log above."
            exit 1
          fi
          if ! phpcs -i | grep -q "WooCommerce"; then
            echo "::warning::WooCommerce standard not registered — WooCommerce-specific sniffs will be skipped."
          fi

      - name: Run PHPCS
        if: steps.stack.outputs.has_wp == 'true'
        continue-on-error: true
        run: |
          set -o pipefail
          export PATH="$HOME/.composer/vendor/bin:$PATH"
          cd target

          # Write a minimal JSON shell first so normalize step always has a file
          echo '{"totals":{"errors":0,"warnings":0,"fixable":0},"files":{}}' > ../phpcs-raw.json

          # Run PHPCS. Non-zero exit is NORMAL when findings exist — that's the
          # whole point. We capture stderr so real errors (missing standard,
          # parse failure) aren't masked.
          phpcs \
            --standard=../configs/phpcs-ruleset.xml \
            --report=json \
            --report-file=../phpcs-raw.json \
            --runtime-set testVersion 7.4- \
            . \
            2> >(tee /tmp/phpcs-stderr.log >&2) \
            || true

          echo "---- PHPCS stderr (if any) ----"
          cat /tmp/phpcs-stderr.log || true

          # Sanity check: did the report contain any files? Zero files scanned
          # usually means the path was wrong or the standard failed to load.
          file_count=$(jq '.files | length' ../phpcs-raw.json 2>/dev/null || echo 0)
          echo "PHPCS scanned $file_count files"
          if [ "$file_count" = "0" ]; then
            echo "::warning::PHPCS report contains 0 files. Either the repo has no PHP, or the standard failed to load."
          fi

      - name: Normalize PHPCS findings
        if: steps.stack.outputs.has_wp == 'true'
        run: node scripts/normalize-findings.js phpcs phpcs-raw.json ${{ matrix.target }}

      # ---------------- Semgrep (any code) ----------------
      - name: Install Semgrep
        if: steps.stack.outputs.has_any_code == 'true'
        run: |
          # Pin to a known-good recent version. Bump periodically; the OCaml
          # tree-sitter parsers for TSX/modern-JS syntax improve release-over-release.
          pip install 'semgrep>=1.100'
          semgrep --version

      - name: Run Semgrep
        if: steps.stack.outputs.has_any_code == 'true'
        continue-on-error: true
        working-directory: target
        run: |
          echo '{"results":[],"errors":[]}' > ../semgrep-raw.json

          semgrep \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/php \
            --config=p/wordpress \
            --config=p/nodejs \
            --config=p/react \
            --json \
            --output=../semgrep-raw.json \
            --disable-version-check \
            --metrics=off \
            . \
            || true

          # Surface counts + scanner-internal errors grouped by type so the
          # workflow log shows "8× PartialParsing, 2× Timeout" instead of
          # 12 individual multi-line objects that get truncated.
          findings=$(jq '.results | length' ../semgrep-raw.json 2>/dev/null || echo "?")
          errors=$(jq '.errors | length' ../semgrep-raw.json 2>/dev/null || echo "?")
          echo "Semgrep: $findings findings, $errors scanner errors"

          if [ "$errors" != "0" ] && [ "$errors" != "?" ]; then
            echo "::warning::Semgrep reported $errors internal errors — some rules may not have run"
            echo "---- error summary by type ----"
            jq -r '.errors | group_by(.type) | map({type: .[0].type, count: length}) | .[] | "  \(.count)× \(.type)"' ../semgrep-raw.json 2>/dev/null || true
            echo "---- first 3 full error messages ----"
            jq -c '.errors[0:3] | .[] | {type, long_msg: (.long_msg // "")[0:300]}' ../semgrep-raw.json 2>/dev/null || true
            echo "(Full errors preserved in reports/<repo>/semgrep-errors.json by normalizer)"
          fi

      - name: Normalize Semgrep findings
        if: steps.stack.outputs.has_any_code == 'true'
        run: node scripts/normalize-findings.js semgrep semgrep-raw.json ${{ matrix.target }}

      # ---------------- Upload results ----------------
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.target }}
          path: reports/${{ matrix.target }}/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Job 3: Aggregate — regenerate dashboard
  # ---------------------------------------------------------------------------
  aggregate:
    needs: [discover, scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download discovery artifact
        uses: actions/download-artifact@v4
        with:
          name: discovered-targets
          path: .

      - name: Download per-repo reports
        uses: actions/download-artifact@v4
        with:
          path: incoming/
          pattern: report-*

      - name: Merge into reports/
        run: |
          set -euo pipefail
          mkdir -p reports
          for dir in incoming/report-*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir" | sed 's/^report-//')
            mkdir -p "reports/$name"
            cp -r "$dir/"* "reports/$name/"
          done
          rm -rf incoming/

      - name: Regenerate dashboard
        env:
          TARGETS_JSON: discovered-targets.json
        run: node scripts/aggregate.js

      - name: Commit results
        run: |
          set -euo pipefail
          git config user.name  "repo-health-bot"
          git config user.email "repo-health-bot@users.noreply.github.com"
          git add reports/ README.md
          if git diff --cached --quiet; then
            echo "No dashboard changes."
          else
            git commit -m "chore(scan): weekly findings $(date -u +%Y-%m-%d)"
            git push
          fi

  # ---------------------------------------------------------------------------
  # Job 4: File issues
  # ---------------------------------------------------------------------------
  file-issues:
    needs: aggregate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Phase 3c: commit reports/<repo>/history.json updates
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Pull latest
        run: git pull --ff-only origin main

      - name: Download discovery artifact
        uses: actions/download-artifact@v4
        with:
          name: discovered-targets
          path: .

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: File / update per-repo health issues
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
          ORG: Kilowott-labs
          TARGETS_JSON: discovered-targets.json
          REPORTS_DIR: reports
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/file-issues.js

      - name: Post state-transition audit comments
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
          ORG: Kilowott-labs
          TARGETS_JSON: discovered-targets.json
          REPORTS_DIR: reports
          THRESHOLD: '5'
        run: node scripts/state-transition-commenter.js

      - name: Commit updated history files
        if: always()
        run: |
          set -euo pipefail
          git config user.name  "repo-health-bot"
          git config user.email "repo-health-bot@users.noreply.github.com"
          git add reports/
          if ! git diff --cached --quiet; then
            git commit -m "chore(history): update transition history $(date -u +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push
          fi

      - name: Track SLA breaches
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_SCAN_TOKEN }}
          ORG: Kilowott-labs
          TARGETS_JSON: discovered-targets.json
          SLA_THRESHOLD_DAYS: '30'
        run: node scripts/sla-tracker.js

      - name: Notify Slack on critical findings
        if: always()
        env:
          CRITICAL_ALERT_WEBHOOK: ${{ secrets.CRITICAL_ALERT_WEBHOOK }}
          TARGETS_JSON: discovered-targets.json
          REPORTS_DIR: reports
          ORG: Kilowott-labs
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/slack-notify.js
