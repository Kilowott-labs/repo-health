# Kilowott-labs scan targets — OVERRIDE FILE
# ------------------------------------------
# Auto-discovery runs first and pulls every repo in the org, then these
# overrides apply. You only need to edit this file when you disagree with
# what auto-discovery decided.
#
# Auto-discovery rules (reference — don't edit these, they live in scripts/discover.js):
#   SKIP if: archived, fork, disabled, empty, or name contains scratch/test/demo
#   priority: critical — if name contains security/secret/auth
#   priority: high — if private AND starts with kw-
#   priority: medium — everything else
#   stack: auto-detected from repo language (php/node/frontend/powershell/other)

# --- Skip list ---------------------------------------------------------------
# Repo names to skip even if auto-discovery would include them.
# Use this for repos that don't match the auto-skip name patterns but still
# shouldn't be scanned (experimental, client-owned, temporary, etc.)
skip:
  # - example-scratch-repo

# --- Priority / stack overrides ----------------------------------------------
# Per-repo overrides when the auto-detected values are wrong.
# Only specify the fields you want to override — others stay auto-detected.
overrides:
  nordic-fund-day:
    priority: high          # default "medium" — this is live client work, bump severity
  # kw-security-plugin:
  #   priority: critical    # already critical by name match — no override needed

  # Phase 5c — monthly phpcbf auto-fix PRs. Canary scope: only
  # kw-wp-scaffold is flagged for now. Rollout to other WP repos
  # happens after the canary's first merged PR validates the flow.
  kw-wp-scaffold:
    priority: high          # private + kw- prefix already gives this, explicit for clarity
    autofix:
      phpcs: true

  # Example of overriding stack when auto-detection misses something:
  # some-repo:
  #   stack: wp-theme       # repo language is PHP but it's actually a WP theme
